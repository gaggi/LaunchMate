name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure CMake x64
        run: cmake --preset vs2022-x64

      - name: Build Release x64
        run: cmake --build --preset build-vs2022-x64-release

      - name: Configure CMake x86
        run: cmake --preset vs2022-x86

      - name: Build Release x86
        run: cmake --build --preset build-vs2022-x86-release

      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $assetRoot = Join-Path $env:RUNNER_TEMP "launchmate-release"
          $x64PackageDir = Join-Path $assetRoot "LaunchMate-x64"
          $x86PackageDir = Join-Path $assetRoot "LaunchMate-x86"
          $x64ZipPath = Join-Path $env:GITHUB_WORKSPACE "LaunchMate-$tag-windows-x64.zip"
          $x64HashPath = Join-Path $env:GITHUB_WORKSPACE "LaunchMate-$tag-windows-x64.sha256"
          $x86ZipPath = Join-Path $env:GITHUB_WORKSPACE "LaunchMate-$tag-windows-x86.zip"
          $x86HashPath = Join-Path $env:GITHUB_WORKSPACE "LaunchMate-$tag-windows-x86.sha256"

          Remove-Item -Recurse -Force $assetRoot -ErrorAction SilentlyContinue
          Remove-Item -Force $x64ZipPath -ErrorAction SilentlyContinue
          Remove-Item -Force $x64HashPath -ErrorAction SilentlyContinue
          Remove-Item -Force $x86ZipPath -ErrorAction SilentlyContinue
          Remove-Item -Force $x86HashPath -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Path $x64PackageDir -Force | Out-Null
          New-Item -ItemType Directory -Path $x86PackageDir -Force | Out-Null

          Copy-Item "build/vs2022-x64/Release/LaunchMate.exe" $x64PackageDir
          Copy-Item "README.md" $x64PackageDir

          Copy-Item "build/vs2022-x86/Release/LaunchMate.exe" $x86PackageDir
          Copy-Item "README.md" $x86PackageDir

          Compress-Archive -Path (Join-Path $x64PackageDir "*") -DestinationPath $x64ZipPath
          Compress-Archive -Path (Join-Path $x86PackageDir "*") -DestinationPath $x86ZipPath

          $x64Hash = (Get-FileHash -Algorithm SHA256 $x64ZipPath).Hash.ToLowerInvariant()
          Set-Content -Path $x64HashPath -NoNewline -Value "$x64Hash  $(Split-Path -Leaf $x64ZipPath)"

          $x86Hash = (Get-FileHash -Algorithm SHA256 $x86ZipPath).Hash.ToLowerInvariant()
          Set-Content -Path $x86HashPath -NoNewline -Value "$x86Hash  $(Split-Path -Leaf $x86ZipPath)"

          "RELEASE_X64_ZIP=$x64ZipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_X64_SHA256=$x64HashPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_X86_ZIP=$x86ZipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_X86_SHA256=$x86HashPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            $env:RELEASE_X64_ZIP,
            $env:RELEASE_X64_SHA256,
            $env:RELEASE_X86_ZIP,
            $env:RELEASE_X86_SHA256
          )

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          }
          else {
            gh release create $tag $assets --verify-tag --generate-notes
          }
